services:
  # Redis Cache (Celery broker + app cache)
  - type: redis
    name: chess-insight-redis
    plan: free
    region: oregon
    # Required by Render for Key Value / Redis. Empty list = internal-only (Render private network).
    ipAllowList: []

  # Backend API Service
  - type: web
    name: chess-insight-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: |
      cd backend
      bash scripts/render_install_stockfish.sh .
      test -x stockfish/stockfish
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: |
      cd backend
      uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      # Supabase Postgres + Auth — set in Render dashboard (never commit real values)
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_JWT_ALGORITHM
        value: HS256
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: REDIS_HOST
        fromService:
          type: redis
          name: chess-insight-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: chess-insight-redis
          property: port
      - key: REDIS_DB
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: CHESSCOM_API_BASE_URL
        value: https://api.chess.com/pub
      - key: CHESSCOM_API_RATE_LIMIT
        value: 100
      - key: MAX_GAMES_PER_ANALYSIS
        value: 50
      - key: STOCKFISH_PATH
        value: stockfish/stockfish
      - key: STOCKFISH_DEPTH
        value: 15
      - key: STOCKFISH_TIME
        value: 1.0
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: REPORTS_DIR
        value: /tmp/reports
      - key: ANALYSIS_CACHE_EXPIRE_HOURS
        value: 24
      - key: BACKEND_CORS_ORIGINS
        sync: false
    healthCheckPath: /api/v1/health

  # Celery worker — async game analysis (requires Render Starter+ for type: worker)
  - type: worker
    name: chess-insight-celery
    env: python
    region: oregon
    plan: starter
    buildCommand: |
      cd backend
      bash scripts/render_install_stockfish.sh .
      test -x stockfish/stockfish
      pip install -r requirements.txt
    # Render did not retain the generated binary in one deploy. Re-running the
    # idempotent installer at startup guarantees the worker never starts without it.
    startCommand: cd backend && bash scripts/render_install_stockfish.sh . && python scripts/verify_celery_worker_env.py && exec celery -A app.celery_app:celery_app worker --loglevel=info -Q analysis --concurrency=1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: chess-insight-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: chess-insight-redis
          property: port
      - key: REDIS_DB
        value: "0"
      - key: SECRET_KEY
        fromService:
          type: web
          name: chess-insight-backend
          envVarKey: SECRET_KEY
      - key: STOCKFISH_PATH
        value: stockfish/stockfish
      - key: STOCKFISH_DEPTH
        value: 15
      - key: STOCKFISH_TIME
        value: 1.0
      - key: LOG_LEVEL
        value: INFO
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: REPORTS_DIR
        value: /tmp/reports
