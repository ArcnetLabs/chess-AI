# Optional Celery worker for Render — requires a PAID plan (background workers
# are not available on Render free tier).
#
# To enable async game analysis on Render:
# 1. Upgrade workspace or use a plan that supports `type: worker`
# 2. Merge this block into render.yaml (after chess-insight-backend)
# 3. Re-sync the Blueprint
#
# On free tier, Redis + backend deploy from render.yaml; queued analysis returns
# 503 until a worker is running (local: docker compose --profile celery up celery-worker).

  - type: worker
    name: chess-insight-celery
    env: python
    region: oregon
    plan: starter
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      celery -A app.celery_app worker --loglevel=info -Q analysis
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: chess-insight-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: chess-insight-redis
          property: port
      - key: REDIS_DB
        value: "0"
      - key: SECRET_KEY
        fromService:
          type: web
          name: chess-insight-backend
          envVarKey: SECRET_KEY
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: STOCKFISH_DEPTH
        value: 15
      - key: LOG_LEVEL
        value: INFO
