services:
  # PostgreSQL Database - Local Development
  postgres:
    image: postgres:15
    container_name: chess-insight-postgres
    environment:
      POSTGRES_USER: chessai
      POSTGRES_PASSWORD: chessai
      POSTGRES_DB: chessai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chessai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: chess-insight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Backend API - Run locally (not in Docker) to connect to Supabase
  # Use: python -m uvicorn app:app --reload --host 0.0.0.0 --port 8000
  # backend:
  #   build: ./backend
  #   container_name: chess-insight-backend
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - .env
  #   environment:
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - REDIS_DB=0
  #     - STOCKFISH_PATH=/usr/games/stockfish
  #     - LOG_LEVEL=INFO
  #   volumes:
  #     - ./backend:/app
  #     - backend_uploads:/app/uploads
  #     - backend_reports:/app/reports
  #   depends_on:
  #     redis:
  #       condition: service_started
  #   restart: unless-stopped

  # Frontend (when ready)
  frontend:
    build: ./frontend
    container_name: chess-insight-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - redis
    restart: unless-stopped
    profiles: [ "frontend" ] # Optional service, enable with --profile frontend

  # Celery Worker (for background tasks)
  celery-worker:
    build: ./backend
    container_name: chess-insight-celery
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      # Database config comes from .env (Supabase)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - STOCKFISH_PATH=/usr/games/stockfish
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    profiles: [ "celery" ] # Optional service for background processing

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_reports:


networks:
  default:
    name: chess-insight-network
